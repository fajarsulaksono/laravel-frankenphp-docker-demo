services:
  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: laravel-frankenphp-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-9000}:80"
    volumes:
      - .:/app
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - nginx-logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - laravel
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FrankenPHP Application (internal only, not exposed)
  app:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    container_name: laravel-frankenphp-app
    restart: unless-stopped
    working_dir: /app
    environment:
      - APP_NAME=${APP_NAME:-Laravel}
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_URL=${APP_URL:-http://localhost:9000}
      - APP_KEY=${APP_KEY:-}
      - LOG_CHANNEL=${LOG_CHANNEL:-stack}
      - DB_CONNECTION=${DB_CONNECTION:-mysql}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:-laravel}
      - DB_USERNAME=${DB_USERNAME:-laravel}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - CACHE_DRIVER=${CACHE_DRIVER:-redis}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-redis}
    volumes:
      - .:/app
      - ./docker/entrypoint.sh:/entrypoint.sh
    depends_on:
      - db
      - redis
    networks:
      - laravel
    entrypoint: /bin/bash
    command: -c "chmod +x /entrypoint.sh && /entrypoint.sh"

  # MariaDB Database
  db:
    image: mariadb:11.4
    container_name: laravel-frankenphp-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-laravel}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MARIADB_PASSWORD: ${DB_PASSWORD:-password}
      MARIADB_USER: ${DB_USERNAME:-laravel}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - laravel
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: laravel-frankenphp-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    networks:
      - laravel
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # phpMyAdmin (Optional - untuk management database)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: laravel-frankenphp-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USERNAME:-laravel}
      PMA_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "${PMA_PORT:-9001}:80"
    depends_on:
      - db
    networks:
      - laravel

  # Jaeger for Distributed Tracing & OpenTelemetry
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: laravel-frankenphp-jaeger
    restart: unless-stopped
    ports:
      - "${JAEGER_AGENT_PORT:-6831}:6831/udp"
      - "${JAEGER_COLLECTOR_PORT:-14268}:14268"
      - "${JAEGER_QUERY_PORT:-9016}:16686"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      MEMORY_MAX_TRACES: 10000
    networks:
      - laravel
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:16686/"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  dbdata:
    driver: local
  redisdata:
    driver: local
  nginx-logs:
    driver: local

networks:
  laravel:
    driver: bridge
